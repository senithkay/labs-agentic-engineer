apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: app-factory-mongodb-pvc
  namespace: wso2cloud
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: v1
kind: Secret
metadata:
  name: app-factory-mongodb
  namespace: wso2cloud
type: Opaque
stringData:
  root-username: root
  root-password: app_factory_root_pwd
---
apiVersion: v1
kind: Service
metadata:
  name: app-factory-mongodb
  namespace: wso2cloud
spec:
  selector:
    app: app-factory-mongodb
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-factory-mongodb
  namespace: wso2cloud
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-factory-mongodb
  template:
    metadata:
      labels:
        app: app-factory-mongodb
    spec:
      containers:
        - name: mongodb
          image: mongo:7.0
          ports:
            - containerPort: 27017
          env:
            - name: MONGO_INITDB_ROOT_USERNAME
              valueFrom:
                secretKeyRef:
                  name: app-factory-mongodb
                  key: root-username
            - name: MONGO_INITDB_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-factory-mongodb
                  key: root-password
          volumeMounts:
            - name: data
              mountPath: /data/db
          readinessProbe:
            exec:
              command:
                - mongosh
                - --eval
                - "db.adminCommand('ping')"
            initialDelaySeconds: 15
            periodSeconds: 10
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: app-factory-mongodb-pvc
