apiVersion: v1
kind: ServiceAccount
metadata:
  name: ae-installer
  namespace: ae-system
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: wso2-agentic-engineer
---
# cluster-admin is intentional: the installer creates namespaces, installs Helm
# releases with CRDs, ClusterRoles, ESO resources, and RBAC across the cluster.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ae-installer
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: wso2-agentic-engineer
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: ae-installer
    namespace: ae-system
