---
# ReferenceGrant to allow HTTPRoute in the gateway namespace to reference Service in ae-thunder
apiVersion: gateway.networking.k8s.io/v1beta1
kind: ReferenceGrant
metadata:
  name: ae-thunder-backend
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: thunder
spec:
  from:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      namespace: {{ .Values.ocIngress.gatewayNamespace }}
  to:
    - group: ""
      kind: Service
---
# HTTPRoute in gateway namespace to route traffic to AE Thunder
# This is required because the gateway only allows HTTPRoutes from the same namespace
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Values.ocIngress.gatewayNamespace }}
  labels:
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/name: thunder
spec:
  hostnames:
    - {{ .Values.thunder.ocIngress.hostname }}
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: {{ .Values.ocIngress.gatewayName }}
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: {{ .Values.thunder.serviceNameOverride | default (printf "%s-service" .Release.Name) }}
          namespace: {{ .Release.Namespace }}
          port: {{ .Values.thunder.service.port }}
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
