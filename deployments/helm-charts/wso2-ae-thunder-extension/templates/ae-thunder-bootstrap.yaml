apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Values.thunder.bootstrap.configMap.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/component: thunder-bootstrap
  annotations:
    "helm.sh/hook": pre-install
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  50-asdlc-system-client.sh: |
    #!/bin/bash
    set -e

    SCRIPT_DIR="$(dirname "${BASH_SOURCE[0]:-$0}")"
    source "${SCRIPT_DIR}/common.sh"


    log_info "Checking if application '{{ .Values.bootstrap.systemClient.name }}' already exists..."

    # Get the default OU ID
    RESPONSE=$(thunder_api_call GET "/organization-units/tree/default")
    HTTP_CODE="${RESPONSE: -3}"
    BODY="${RESPONSE%???}"
    if [[ "$HTTP_CODE" != "200" ]]; then
      log_error "Failed to fetch default organization unit (HTTP $HTTP_CODE)"
      echo "Response: $BODY"
      exit 1
    fi
    DEFAULT_OU_ID=$(echo "$BODY" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

    if [[ -z "$DEFAULT_OU_ID" ]]; then
      log_error "Could not extract default organization unit ID from response"
      echo "Response: $BODY"
      exit 1
    fi

    # Look up the default auth flow ID
    RESPONSE=$(thunder_api_call GET "/flows?flowType=AUTHENTICATION&limit=200")
    HTTP_CODE="${RESPONSE: -3}"
    BODY="${RESPONSE%???}"
    if [[ "$HTTP_CODE" != "200" ]]; then
      log_error "Failed to fetch authentication flows (HTTP $HTTP_CODE)"
      echo "Response: $BODY"
      exit 1
    fi
    AUTH_FLOW_ID=$(echo "$BODY" | sed 's/},{/}\n{/g' | grep '"handle":"default-basic-flow"' | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)

    if [[ -z "$AUTH_FLOW_ID" ]]; then
      log_error "Could not find default-basic-flow authentication flow"
      exit 1
    fi
    log_info "Using auth flow ID: $AUTH_FLOW_ID"

    # Check existing apps
    RESPONSE=$(thunder_api_call GET "/applications")
    HTTP_CODE="${RESPONSE: -3}"
    BODY="${RESPONSE%???}"
    if [[ "$HTTP_CODE" != "200" ]]; then
      log_error "Failed to fetch applications (HTTP $HTTP_CODE)"
      echo "Response: $BODY"
      exit 1
    fi

    APP_PAYLOAD='{
      "name": "{{ .Values.bootstrap.systemClient.name }}",
      "description": "{{ .Values.bootstrap.systemClient.description }}",
      "ouId": "'${DEFAULT_OU_ID}'",
      "authFlowId": "'${AUTH_FLOW_ID}'",
      "inboundAuthConfig": [
        {
          "type": "oauth2",
          "config": {
            "clientId": "{{ .Values.bootstrap.systemClient.clientId }}",
            "clientSecret": "{{ .Values.bootstrap.systemClient.clientSecret }}",
            "grantTypes": ["client_credentials"],
            "tokenEndpointAuthMethod": "client_secret_post",
            "pkceRequired": false,
            "publicClient": false,
            "token": {
              "accessToken": {
                "validityPeriod": 3600
              }
            }
          }
        }
      ]
    }'

    SYSTEM_APP_ID=""

    if echo "$BODY" | grep -q '"clientId":"{{ .Values.bootstrap.systemClient.clientId }}"'; then
      SYSTEM_APP_ID=$(echo "$BODY" | sed 's/},{/}\n{/g' | grep '"clientId":"{{ .Values.bootstrap.systemClient.clientId }}"' | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
      log_info "Application '{{ .Values.bootstrap.systemClient.name }}' already exists (id: $SYSTEM_APP_ID), updating..."
      RESPONSE=$(thunder_api_call PUT "/applications/$SYSTEM_APP_ID" "$APP_PAYLOAD")
      HTTP_CODE="${RESPONSE: -3}"
      if [[ "$HTTP_CODE" == "200" ]]; then
        log_info "Application '{{ .Values.bootstrap.systemClient.name }}' updated successfully"
      else
        log_error "Failed to update application (HTTP $HTTP_CODE)"
        echo "Response: ${RESPONSE%???}"
        exit 1
      fi
    else
      log_info "Application '{{ .Values.bootstrap.systemClient.name }}' does not exist, creating..."
      RESPONSE=$(thunder_api_call POST "/applications" "$APP_PAYLOAD")
      HTTP_CODE="${RESPONSE: -3}"
      BODY="${RESPONSE%???}"
      if [[ "$HTTP_CODE" == "201" ]] || [[ "$HTTP_CODE" == "200" ]]; then
        SYSTEM_APP_ID=$(echo "$BODY" | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
        log_info "Application '{{ .Values.bootstrap.systemClient.name }}' created successfully (id: $SYSTEM_APP_ID)"
      elif [[ "$HTTP_CODE" == "409" ]]; then
        log_info "Application '{{ .Values.bootstrap.systemClient.name }}' already exists, skipping"
        # Re-fetch to get the ID
        RESPONSE=$(thunder_api_call GET "/applications")
        BODY="${RESPONSE%???}"
        SYSTEM_APP_ID=$(echo "$BODY" | sed 's/},{/}\n{/g' | grep '"clientId":"{{ .Values.bootstrap.systemClient.clientId }}"' | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
      else
        log_error "Failed to create application (HTTP $HTTP_CODE)"
        echo "Response: $BODY"
        exit 1
      fi
    fi

    if [[ -z "$SYSTEM_APP_ID" ]]; then
      log_error "Could not determine system app ID"
      exit 1
    fi

    log_info "50-asdlc-system-client.sh completed successfully"

  51-asdlc-default-roles.sh: |
    #!/bin/bash
    set -e

    SCRIPT_DIR="$(dirname "${BASH_SOURCE[0]:-$0}")"
    source "${SCRIPT_DIR}/common.sh"


    log_info "Looking up Administrator role..."

    # ---------------------------------------------------------------------------
    # Look up the Administrator role created by Thunder's 01-default-resources.sh
    # ---------------------------------------------------------------------------
    ROLES_RESPONSE=$(thunder_api_call GET "/roles")
    ROLES_HTTP_CODE="${ROLES_RESPONSE: -3}"
    ROLES_BODY="${ROLES_RESPONSE%???}"
    if [[ "$ROLES_HTTP_CODE" != "200" ]]; then
      log_error "Failed to fetch roles (HTTP $ROLES_HTTP_CODE)"
      exit 1
    fi
    ADMIN_ROLE_ID=$(echo "$ROLES_BODY" | sed 's/},{/}\n{/g' | grep '"name":"Administrator"' | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
    if [[ -z "$ADMIN_ROLE_ID" ]]; then
      log_error "Administrator role not found — ensure 01-default-resources.sh ran successfully"
      exit 1
    fi
    log_info "Found Administrator role (id: $ADMIN_ROLE_ID)"

    # ---------------------------------------------------------------------------
    # Look up the asdlc-system-client app ID
    # ---------------------------------------------------------------------------
    RESPONSE=$(thunder_api_call GET "/applications")
    HTTP_CODE="${RESPONSE: -3}"
    BODY="${RESPONSE%???}"
    if [[ "$HTTP_CODE" != "200" ]]; then
      log_error "Failed to fetch applications (HTTP $HTTP_CODE)"
      exit 1
    fi

    SYSTEM_APP_ID=$(echo "$BODY" | sed 's/},{/}\n{/g' | grep '"clientId":"{{ .Values.bootstrap.systemClient.clientId }}"' | grep -o '"id":"[^"]*"' | head -1 | cut -d'"' -f4)
    if [[ -z "$SYSTEM_APP_ID" ]]; then
      log_error "Could not find application '{{ .Values.bootstrap.systemClient.clientId }}' — run 50-asdlc-system-client.sh first"
      exit 1
    fi
    log_info "Found system client app ID: $SYSTEM_APP_ID"

    # ---------------------------------------------------------------------------
    # Assign asdlc-system-client to the Administrator role
    # ---------------------------------------------------------------------------

    # Pre-check to avoid duplicate assignment (Thunder may return 500 on duplicate)
    EXISTING=$(thunder_api_call GET "/roles/${ADMIN_ROLE_ID}/assignments")
    EXISTING_BODY="${EXISTING%???}"
    ALREADY_BOUND=$(echo "$EXISTING_BODY" | grep -c "\"id\":\"${SYSTEM_APP_ID}\"" || true)

    if [[ "${ALREADY_BOUND:-0}" -gt 0 ]]; then
      log_info "{{ .Values.bootstrap.systemClient.clientId }} already bound to Administrator role — skipping"
    else
      RESPONSE=$(thunder_api_call POST "/roles/${ADMIN_ROLE_ID}/assignments/add" \
        "{\"assignments\":[{\"id\":\"${SYSTEM_APP_ID}\",\"type\":\"app\"}]}")
      HTTP_CODE="${RESPONSE: -3}"
      if [[ "$HTTP_CODE" == "200" ]] || [[ "$HTTP_CODE" == "201" ]] || [[ "$HTTP_CODE" == "204" ]]; then
        log_info "{{ .Values.bootstrap.systemClient.clientId }} assigned to Administrator role successfully"
      elif [[ "$HTTP_CODE" == "409" ]]; then
        log_info "{{ .Values.bootstrap.systemClient.clientId }} already bound to Administrator role — skipping"
      else
        log_error "Failed to assign system client to Administrator role (HTTP $HTTP_CODE)"
        echo "Response: ${RESPONSE%???}"
        exit 1
      fi
    fi

    log_info "51-asdlc-default-roles.sh completed successfully"
