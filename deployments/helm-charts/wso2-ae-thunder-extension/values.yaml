# ── OC Ingress ────────────────────────────────────────────────────────────────
ocIngress:
  gatewayNamespace: "openchoreo-control-plane"
  gatewayName: "gateway"

# ── ASDLC bootstrap configuration ─────────────────────────────────────────────
bootstrap:
  # System client for ASDLC platform to provision per-org OAuth apps via Thunder admin API
  # WARNING: clientSecret below is a LOCAL-DEVELOPMENT-ONLY placeholder.
  # In production, override bootstrap.systemClient.clientSecret via a Kubernetes Secret
  # or external secret manager. Deploying with this default value is insecure.
  systemClient:
    clientId: "asdlc-system-client"
    clientSecret: "asdlc-system-client-secret"
    name: "ASDLC System Client"
    description: "System client for ASDLC platform to provision per-org OAuth apps via Thunder admin API"
  defaultUsers:
    - username: "asdlc-admin@wso2.com"
      password: "Asdlc-Admin@wso2.com"
      givenName: "Admin"
      familyName: "User"
      groups: ["platformEngineer"]
  userSchema:
    name: "engineer"
    allowSelfRegistration: true
  organizationUnit:
    handle: "default"

# ── Thunder subchart configuration ────────────────────────────────────────────
thunder:
  # fullnameOverride: controls the Kubernetes resource name prefix for the Thunder
  # sub-chart (Deployment, Service, etc.). Set when using this chart as a bundle
  # sub-chart so the service name is predictable regardless of the parent release name.
  fullnameOverride: ""
  # serviceNameOverride: overrides the backend Service name used in ae-thunder-httproute.yaml.
  # Must match the actual Thunder Service name (i.e. fullnameOverride + "-service" or
  # the default "<release-name>-service"). Set this when embedding in a parent bundle.
  serviceNameOverride: ""
  deployment:
    replicaCount: 1
    strategy:
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
    securityContext:
      # Read-only root filesystem. Must be false for SQLite
      readOnlyRootFilesystem: false
      enableRunAsUser: true
      fsGroup: 10001
      runAsUser: 10001
      seccompProfile:
        enabled: true
        type: RuntimeDefault
    terminationGracePeriodSeconds: 10
    image:
      registry: ghcr.io/asgardeo
      repository: thunder
      tag: "0.34.0"
      pullPolicy: Always
    container:
      port: 8090
    resources:
      limits:
        cpu: 500m
        memory: 512Mi
      requests:
        cpu: 100m
        memory: 128Mi
  persistence:
    enabled: false
    storageClass: ""
    accessMode: ReadWriteOnce
    size: 1Gi
    annotations: {}
  service:
    port: 8090
  serviceAccount:
    name: thunder-service-account
    create: true
  hpa:
    enabled: false
  pdb:
    minAvailable: "50%"
  ingress:
    enabled: false
  ocIngress:
    hostname: "thunder.asdlc.example.com"
  configuration:
    server:
      port: 8090
      httpOnly: true
      publicUrl: "https://thunder.asdlc.example.com"
    gateClient:
      # Must match the publicly accessible Thunder hostname (same as ocIngress.hostname).
      hostname: "thunder.asdlc.example.com"
      port: 8080
      scheme: "http"
      path: "/gate"
    crypto:
      encryption:
        key: "file://repository/resources/security/crypto.key"
      passwordHashing:
        algorithm: "PBKDF2"
        argon2id:
          iterations: 2
          memory: 19456
          parallelism: 1
          key_size: 32
          salt_size: 16
        pbkdf2:
          iterations: 600000
          key_size: 32
          salt_size: 16
        sha256:
          salt_size: 16
      keys:
        - id: "default-key"
          certFile: "repository/resources/security/signing.cert"
          keyFile: "repository/resources/security/signing.key"
    database:
      config:
        type: sqlite
        sqlite:
          path: "repository/database/configdb.db"
          options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
          max_open_conns: 500
          max_idle_conns: 100
          conn_max_lifetime: 3600
      runtime:
        type: sqlite
        sqlite:
          path: "repository/database/runtimedb.db"
          options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
          max_open_conns: 500
          max_idle_conns: 100
          conn_max_lifetime: 3600
      user:
        type: sqlite
        sqlite:
          path: "repository/database/userdb.db"
          options: "_journal_mode=WAL&_busy_timeout=5000&_pragma=foreign_keys(1)"
          max_open_conns: 500
          max_idle_conns: 100
          conn_max_lifetime: 3600
    cache:
      disabled: false
      type: "inmemory"
      size: 1000
      ttl: 3600
      evictionPolicy: "LRU"
      cleanupInterval: 300
    jwt:
      issuer: "https://thunder.asdlc.example.com"
      validityPeriod: 3600
      audience: "application"
      preferredKeyId: "default-key"
    oauth:
      refreshToken:
        renewOnGrant: false
        validityPeriod: 86400
      authorizationCode:
        validityPeriod: 600
      dcr:
        insecure: false
    consent:
      enabled: true
      baseUrl: "http://localhost:9090/api/v1"
      timeout: 5
      maxRetries: 3
      server:
        port: 9090
        hostname: "localhost"
      database:
        type: sqlite
        sqlitePath: "repository/database/consentdb.db"
        sqliteOptions: "_pragma=journal_mode(WAL)&_pragma=cache_size(-16000)"
    cors:
      allowedOrigins:
        - "https://asdlc.example.com"
  setup:
    enabled: true
    backoffLimit: 3
    ttlSecondsAfterFinished: 86400
    preserveJob: true
    debug: false
    resources:
      limits:
        cpu: 500m
        memory: 256Mi
      requests:
        cpu: 250m
        memory: 128Mi
  bootstrap:
    enabled: true
    configMap:
      name: ae-thunder-bootstrap
      files:
        - 50-asdlc-system-client.sh
        - 51-asdlc-default-roles.sh
