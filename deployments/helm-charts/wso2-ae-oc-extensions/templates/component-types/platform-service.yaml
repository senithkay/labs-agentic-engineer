# ClusterComponentType: deployment/platform-service
# Used by ASDLC's own platform services (asdlc-api, agents-service).
# Differs from the generic "service" type in two ways:
#   1. No allowedWorkflows — platform services use pre-built images (BYOI) via
#      ComponentRelease.workload, skipping CI entirely.
#   2. Supports serviceAccountName as a Component parameter so platform services
#      can run under a specific K8s ServiceAccount (e.g. for RBAC).
#      Key/file mounts are handled via ReleaseBinding.workloadOverrides.container.files.
#
# Skip creation if OC already installed this resource (avoids Helm ownership conflict).
{{- if not (lookup "openchoreo.dev/v1alpha1" "ClusterComponentType" "" "platform-service") }}
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterComponentType
metadata:
  name: platform-service
spec:
  workloadType: deployment
  # No allowedWorkflows: platform services are deployed via ComponentRelease
  # with a pre-built image. CI (dockerfile-builder) is not used.
  allowedTraits:
    - kind: ClusterTrait
      name: api-configuration
  parameters:
    openAPIV3Schema:
      type: object
      properties:
        serviceAccountName:
          type: string
          default: ""
          description: "K8s ServiceAccount to run the pod under. Empty = default SA."
  environmentConfigs:
    openAPIV3Schema:
      type: object
      properties:
        replicas:
          type: integer
          default: 1
          minimum: 1
        resources:
          type: object
          default: {}
          properties:
            requests:
              type: object
              default: {}
              properties:
                cpu:
                  type: string
                  default: "100m"
                memory:
                  type: string
                  default: "256Mi"
            limits:
              type: object
              default: {}
              properties:
                cpu:
                  type: string
                  default: "1"
                memory:
                  type: string
                  default: "512Mi"
  resources:
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: "${metadata.componentName}"
          namespace: "${metadata.namespace}"
          labels: "${metadata.labels}"
        spec:
          replicas: "${environmentConfigs.replicas}"
          selector:
            matchLabels: "${metadata.podSelectors}"
          template:
            metadata:
              labels: "${metadata.podSelectors}"
            spec:
              serviceAccountName: "${parameters.serviceAccountName != '' ? parameters.serviceAccountName : oc_omit()}"
              containers:
                - name: main
                  image: "${workload.container.image}"
                  env: ${dependencies.toContainerEnvs()}
                  envFrom: ${configurations.toContainerEnvFrom()}
                  volumeMounts: "${configurations.toContainerVolumeMounts()}"
                  resources:
                    requests:
                      cpu: "${environmentConfigs.resources.requests.cpu}"
                      memory: "${environmentConfigs.resources.requests.memory}"
                    limits:
                      cpu: "${environmentConfigs.resources.limits.cpu}"
                      memory: "${environmentConfigs.resources.limits.memory}"
              volumes: "${configurations.toVolumes()}"

    - id: env-config
      forEach: ${configurations.toConfigEnvsByContainer()}
      var: envConfig
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${envConfig.resourceName}
          namespace: ${metadata.namespace}
        data: |
          ${envConfig.envs.transformMapEntry(index, env, {env.name: env.value})}

    - id: file-config
      forEach: ${configurations.toConfigFileList()}
      var: config
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${config.resourceName}
          namespace: ${metadata.namespace}
        data:
          ${config.name}: |
            ${config.value}

    - id: secret-env-external
      forEach: ${configurations.toSecretEnvsByContainer()}
      var: secretEnv
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${secretEnv.resourceName}
          namespace: ${metadata.namespace}
        spec:
          refreshInterval: 15s
          secretStoreRef:
            name: ${dataplane.secretStore}
            kind: ClusterSecretStore
          target:
            name: ${secretEnv.resourceName}
            creationPolicy: Owner
          data: |
            ${secretEnv.envs.map(secret, {
              "secretKey": secret.name,
              "remoteRef": {
                "key": secret.remoteRef.key,
                "property": has(secret.remoteRef.property) ? secret.remoteRef.property : oc_omit()
              }
            })}

    - id: secret-file-external
      forEach: ${configurations.toSecretFileList()}
      var: file
      template:
        apiVersion: external-secrets.io/v1
        kind: ExternalSecret
        metadata:
          name: ${file.resourceName}
          namespace: ${metadata.namespace}
        spec:
          refreshInterval: 15s
          secretStoreRef:
            name: ${dataplane.secretStore}
            kind: ClusterSecretStore
          target:
            name: ${file.resourceName}
            creationPolicy: Owner
          data:
            - secretKey: ${file.name}
              remoteRef:
                key: ${file.remoteRef.key}
                property: |
                  ${has(file.remoteRef.property) ? file.remoteRef.property : oc_omit()}

    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: "${metadata.componentName}"
          namespace: "${metadata.namespace}"
        spec:
          selector: "${metadata.podSelectors}"
          ports: "${workload.toServicePorts()}"

    - id: httproute-external
      forEach: '${workload.endpoints.transformMap(name, ep, "external" in ep.visibility && ep.type in ["HTTP", "GraphQL", "Websocket"], ep)}'
      var: endpoint
      template:
        apiVersion: gateway.networking.k8s.io/v1
        kind: HTTPRoute
        metadata:
          name: ${oc_generate_name(metadata.componentName, endpoint.key)}
          namespace: "${metadata.namespace}"
          labels: '${oc_merge(metadata.labels, {"openchoreo.dev/endpoint-name": endpoint.key, "openchoreo.dev/endpoint-visibility": "external"})}'
        spec:
          parentRefs:
            - name: "${gateway.ingress.external.name}"
              namespace: "${gateway.ingress.external.namespace}"
          hostnames: |
            ${[gateway.ingress.external.?http, gateway.ingress.external.?https]
              .filter(g, g.hasValue()).map(g, g.value().host).distinct()
              .map(h, oc_dns_label(endpoint.key, metadata.componentName, metadata.environmentName, metadata.componentNamespace) + "." + h)}
          rules:
            - backendRefs:
                - name: "${metadata.componentName}"
                  port: "${endpoint.value.port}"

{{- end }}
