# ClusterResourceType: asdlc-postgres
# Managed PostgreSQL instance for the ASDLC platform.
#
# Password handling: OC's CEL cannot generate random values, so the credentials
# Secret is pre-created by the bundle's pre-install secrets.yaml hook using
# Helm's randAlphaNum function. The credentialsSecretName parameter must point
# to that pre-existing Secret in the same namespace as the Resource.
#
# Skip creation if OC already installed this resource (avoids Helm ownership conflict).
{{- if not (lookup "openchoreo.dev/v1alpha1" "ClusterResourceType" "" "asdlc-postgres") }}
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterResourceType
metadata:
  name: asdlc-postgres
spec:
  parameters:
    openAPIV3Schema:
      type: object
      required:
        - password
      properties:
        image:
          type: string
          default: "postgres:16-alpine"
          description: "PostgreSQL container image."
        database:
          type: string
          default: "asdlc"
          description: "Database name to create on startup."
        username:
          type: string
          default: "asdlc"
          description: "Database user to create on startup."
        password:
          type: string
          description: "Database password. Passed directly to POSTGRES_PASSWORD env var."
        storage:
          type: string
          default: "5Gi"
          description: "PersistentVolumeClaim size for pgdata."

  # Retain data on Resource deletion — operator must manually clean up the PVC.
  retainPolicy: Retain

  resources:
    - id: statefulset
      template:
        apiVersion: apps/v1
        kind: StatefulSet
        metadata:
          name: "${metadata.name}"
          namespace: "${metadata.namespace}"
          labels:
            app: "${metadata.name}"
            app.kubernetes.io/managed-by: openchoreo
        spec:
          serviceName: "${metadata.name}"
          replicas: 1
          selector:
            matchLabels:
              app: "${metadata.name}"
          template:
            metadata:
              labels:
                app: "${metadata.name}"
            spec:
              containers:
                - name: postgres
                  image: "${parameters.image}"
                  ports:
                    - containerPort: 5432
                      name: postgres
                  env:
                    - name: POSTGRES_DB
                      value: "${parameters.database}"
                    - name: POSTGRES_USER
                      value: "${parameters.username}"
                    - name: POSTGRES_PASSWORD
                      value: "${parameters.password}"
                  readinessProbe:
                    exec:
                      command:
                        - pg_isready
                        - -U
                        - "${parameters.username}"
                    initialDelaySeconds: 5
                    periodSeconds: 10
                    timeoutSeconds: 5
                  livenessProbe:
                    exec:
                      command:
                        - pg_isready
                        - -U
                        - "${parameters.username}"
                    initialDelaySeconds: 30
                    periodSeconds: 30
                    timeoutSeconds: 5
                  volumeMounts:
                    - name: pgdata
                      mountPath: /var/lib/postgresql/data
                      subPath: pgdata
          volumeClaimTemplates:
            - metadata:
                name: pgdata
              spec:
                accessModes:
                  - ReadWriteOnce
                resources:
                  requests:
                    storage: "${parameters.storage}"

    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: "asdlc-db"
          namespace: "${metadata.namespace}"
          labels:
            app: "${metadata.name}"
        spec:
          selector:
            app: "${metadata.name}"
          ports:
            - port: 5432
              targetPort: 5432
              name: postgres
          clusterIP: None

{{- end }}
