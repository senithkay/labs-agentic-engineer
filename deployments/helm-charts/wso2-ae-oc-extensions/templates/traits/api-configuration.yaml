# WSO2 API Platform API Configuration Trait for OpenChoreo
#
# Adds WSO2 API Platform API management to components by:
#   - Creating a kgateway Backend pointing to the WSO2 API Platform router
#   - Creating a WSO2 RestApi resource that defines the API in the gateway
#   - Patching the HTTPRoute backendRef to route traffic through the WSO2 router
#   - Patching the HTTPRoute URL rewrite to use the derived API context path
#
# Prerequisites:
#   - WSO2 API Platform gateway installed in the data plane (see README.md Step 1)
#   - WSO2 API Platform CRDs available (RestApi, APIGateway)
#   - kgateway installed (default) with Backend CRD support

# Skip creation if this resource already exists (avoids Helm ownership conflict).
{{- if not (lookup "openchoreo.dev/v1alpha1" "ClusterTrait" "" "api-configuration") }}
---
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterTrait
metadata:
  name: api-configuration
spec:
  environmentConfigs:
    openAPIV3Schema:
      type: object
      $defs:
        CorsConfig:
          type: object
          properties:
            enabled:
              type: boolean
              default: true
            allowedOrigins:
              type: array
              items:
                type: string
              default: ["*"]
            allowedMethods:
              type: array
              items:
                type: string
              default: ["*"]
            allowedHeaders:
              type: array
              items:
                type: string
              default: ["*"]
            allowCredentials:
              type: boolean
              default: false

        JwtAuthConfig:
          type: object
          properties:
            enabled:
              type: boolean
              default: false
            issuers:
              type: array
              items:
                type: string
              default: []
            audience:
              type: array
              items:
                type: string
              default: []

        RateLimitEntry:
          type: object
          properties:
            requests:
              type: integer
            duration:
              type: string

        RateLimitConfig:
          type: object
          properties:
            enabled:
              type: boolean
              default: false
            limits:
              type: array
              items:
                $ref: "#/$defs/RateLimitEntry"
              default: []

        HeaderEntry:
          type: object
          properties:
            name:
              type: string
            value:
              type: string

        AddHeadersConfig:
          type: object
          properties:
            enabled:
              type: boolean
              default: false
            requestHeaders:
              type: array
              items:
                $ref: "#/$defs/HeaderEntry"
              default: []
            responseHeaders:
              type: array
              items:
                $ref: "#/$defs/HeaderEntry"
              default: []

      properties:
        cors:
          $ref: "#/$defs/CorsConfig"
          default: {}
        jwtAuth:
          $ref: "#/$defs/JwtAuthConfig"
          default: {}
        rateLimit:
          $ref: "#/$defs/RateLimitConfig"
          default: {}
        addHeaders:
          $ref: "#/$defs/AddHeadersConfig"
          default: {}

  parameters:
    openAPIV3Schema:
      type: object
      properties:
        endpointName:
          type: string
        operations:
          type: array
          default:
            - method: GET
              path: "/*"
            - method: POST
              path: "/*"
            - method: PUT
              path: "/*"
            - method: PATCH
              path: "/*"
            - method: DELETE
              path: "/*"
            - method: OPTIONS
              path: "/*"
          items:
            type: object
            properties:
              method:
                type: string
              path:
                type: string
        upstreamPort:
          type: integer
          default: 0
          description: "Override upstream port. 0 = use endpoint port from workload."
        upstreamBasePath:
          type: string
          default: ""
          description: "Base path appended to the upstream URL."
      required:
        - endpointName

  creates:
    - template:
        apiVersion: gateway.kgateway.dev/v1alpha1
        kind: Backend
        metadata:
          name: ${metadata.componentName}-${parameters.endpointName}-api-gw-backend
          namespace: ${metadata.namespace}
        spec:
          type: Static
          static:
            hosts:
              - host: api-platform-default-gateway-gateway-runtime.openchoreo-data-plane
                port: 8080

    - template:
        apiVersion: gateway.api-platform.wso2.com/v1alpha1
        kind: RestApi
        metadata:
          name: ${metadata.name}-${parameters.endpointName}
          namespace: ${metadata.namespace}
        spec:
          displayName: ${metadata.environmentName}-${metadata.componentNamespace}-${metadata.componentName}-${parameters.endpointName}
          version: v1.0
          context: /${metadata.environmentName}-${metadata.componentNamespace}-${metadata.componentName}-${parameters.endpointName}
          upstream:
            main:
              url: "http://${metadata.componentName}.${metadata.namespace}:${parameters.upstreamPort > 0 ? parameters.upstreamPort : workload.endpoints[parameters.endpointName].port}${parameters.upstreamBasePath}"
          policies: >-
            ${(environmentConfigs.cors.enabled ? [{"name": "cors", "version": "v1", "params": {"allowedOrigins": environmentConfigs.cors.allowedOrigins, "allowedMethods": environmentConfigs.cors.allowedMethods, "allowedHeaders": environmentConfigs.cors.allowedHeaders, "allowCredentials": environmentConfigs.cors.allowCredentials}}] : [])
              + (environmentConfigs.jwtAuth.enabled ? [{"name": "jwt-auth", "version": "v1", "params": {"issuers": environmentConfigs.jwtAuth.issuers, "audiences": environmentConfigs.jwtAuth.audience, "claimMappings": {"sub": "x-user-id", "username": "x-user-name", "ouHandle": "x-user-ou"}}}] : [])
              + (environmentConfigs.rateLimit.enabled ? [{"name": "basic-ratelimit", "version": "v1", "params": {"limits": environmentConfigs.rateLimit.limits}}] : [])
              + (environmentConfigs.addHeaders.enabled ? [{"name": "add-headers", "version": "v1", "params": {"requestHeaders": environmentConfigs.addHeaders.requestHeaders, "responseHeaders": environmentConfigs.addHeaders.responseHeaders}}] : [])}
          operations: ${parameters.operations}

  patches:
    - target:
        group: gateway.networking.k8s.io
        version: v1
        kind: HTTPRoute
        where: '${resource.metadata.labels["openchoreo.dev/endpoint-name"] == parameters.endpointName}'
      operations:
        - op: replace
          path: /spec/rules/0/backendRefs/[?(@.name=='${metadata.componentName}')]
          value:
            group: gateway.kgateway.dev
            kind: Backend
            name: ${metadata.componentName}-${parameters.endpointName}-api-gw-backend
        - op: replace
          path: /spec/rules/0/filters/0/urlRewrite/path
          value:
            type: ReplacePrefixMatch
            replacePrefixMatch: /${metadata.environmentName}-${metadata.componentNamespace}-${metadata.componentName}-${parameters.endpointName}

{{- end }}
