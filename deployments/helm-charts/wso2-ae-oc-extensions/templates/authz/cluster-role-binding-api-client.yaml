# Grants the asdlc-api service account admin access to OpenChoreo so it can
# create/manage projects, components, workflows, and deployments on behalf of users.
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterAuthzRoleBinding
metadata:
  name: asdlc-api-client-binding
spec:
  effect: allow
  entitlement:
    claim: sub
    value: {{ .Values.authz.apiClientId }}
  roleMappings:
    - roleRef:
        kind: ClusterAuthzRole
        name: admin
