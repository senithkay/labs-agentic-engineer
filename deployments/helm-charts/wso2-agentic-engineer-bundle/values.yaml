# ── Thunder bootstrap ─────────────────────────────────────────────────────────
# Credentials used by the post-install Job to register OAuth clients in AE Thunder.
# These only need to be correct once — the Job is idempotent on re-runs.
thunder:
  # ae-thunder-service is in the same namespace as the bundle (wso2-ae by default).
  adminURL: "http://ae-thunder-service:8090"
  adminUsername: "admin"
  adminPassword: "admin"
  # Image must have sh, curl, and jq (or apk to install them). Alpine-based images
  # install jq via `apk add -q --no-cache jq` at Job start. Override for air-gapped
  # clusters with a pre-baked image containing curl + jq.
  bootstrapImage: "alpine/curl:latest"


# ── AE Thunder IDP (wso2-ae-thunder-extension sub-chart) ─────────────────────
# Deploys a dedicated Thunder instance for ASDLC into the same namespace as
# the bundle. Set ae-thunder.enabled=false to use an external OIDC provider.
ae-thunder:
  enabled: true
  ocIngress:
    gatewayNamespace: "openchoreo-control-plane"
    gatewayName: "gateway"
  thunder:
    fullnameOverride: "ae-thunder"
    serviceNameOverride: "ae-thunder-service"
    ocIngress:
      hostname: "thunder.asdlc.example.com"
    configuration:
      server:
        publicUrl: "https://thunder.asdlc.example.com"
      gateClient:
        hostname: "thunder.asdlc.example.com"
        port: 443
        scheme: "https"
      jwt:
        issuer: "https://thunder.asdlc.example.com"
      cors:
        allowedOrigins:
          - "https://asdlc.example.com"
  bootstrap:
    systemClient:
      clientId: "asdlc-system-client"
      clientSecret: "asdlc-system-client-secret"
      name: "ASDLC System Client"
      description: "System client for ASDLC platform to provision per-org OAuth apps via Thunder admin API"

# ── OC extensions (wso2-ae-oc-extensions sub-chart) ──────────────────────────
# Registers ClusterComponentTypes, ClusterResourceType, ClusterWorkflows,
# ClusterTraits, and RBAC into the OC cluster.
wso2-ae-oc-extensions:
  authz:
    apiClientId: "asdlc-api-client"
    administratorsGroup: "Administrators"

# ── Platform services (wso2-ae-platform sub-chart) ────────────────────────────
# Deploys ASDLC services as OC-native Components (Project/Component/
# ComponentRelease/ReleaseBinding) and PostgreSQL as a Resource.
# Only override values that differ from defaults.
wso2-ae-platform:
  openchoreo:
    apiBaseURL: "http://openchoreo-api.openchoreo-control-plane:8080"
    apiGatewayHost: "api.openchoreo.localhost"

  idp:
    issuer: "https://thunder.asdlc.example.com"
    jwksURL: "https://thunder.asdlc.example.com/oauth2/jwks"
    # In-cluster URL avoids routing through the gateway for JWKS fetches.
    jwksInternalURL: "http://ae-thunder-service:8090/oauth2/jwks"
    tokenURL: "http://ae-thunder-service:8090/oauth2/token"
    adminURL: "http://ae-thunder-service:8090"

  # Observer tokens must come from OC's own Thunder (not AE Thunder).
  observer:
    url: "http://observer.openchoreo-observability-plane.svc.cluster.local:8080"
    oauth:
      tokenURL: "http://thunder-service.thunder.svc.cluster.local:8090/oauth2/token"
      clientId: "openchoreo-observer-resource-reader-client"
      clientSecret: "openchoreo-observer-resource-reader-client-secret"

  openbao:
    addr: "http://openbao.openbao.svc.cluster.local:8200"
    token: "root"

  postgres:
    auth:
      password: "asdlc-dev-password"

  taskSigning:
    issuer: "asdlc-bff"
    audience: "git-service"

  github:
    appSlug: ""
    repoVisibility: "private"
    committerName: "ASDLC Bot"
    committerEmail: "bot@asdlc.dev"
    webhookSecret: "dev-webhook-secret"
    oauthStateKey: "dev-oauth-state-key-32-chars-long!!"
    appId: ""
    clientId: ""
    clientSecret: ""
    appPrivateKeyPem: ""

  anthropic:
    apiKey: ""

  thunderSystemClient:
    clientId: "asdlc-system-client"
    clientSecret: "asdlc-system-client-secret"

  console:
    publicURL: "https://asdlc.example.com"
    thunderPublicURL: "https://thunder.asdlc.example.com"
