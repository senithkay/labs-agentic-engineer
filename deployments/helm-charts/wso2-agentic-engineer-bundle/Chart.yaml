apiVersion: v2
appVersion: 0.3.0
dependencies:
- name: wso2-ae-thunder-extension
  repository: file://../wso2-ae-thunder-extension
  version: 0.1.3
  alias: ae-thunder
  condition: ae-thunder.enabled
- name: wso2-ae-oc-extensions
  repository: file://../wso2-ae-oc-extensions
  version: 0.2.2
- name: wso2-ae-platform
  repository: file://../wso2-ae-platform
  version: 0.1.5
description: 'Single-command install of WSO2 Agentic Engineer on an OpenChoreo cluster.
  Deploys ASDLC platform services as OC-native Components, PostgreSQL as a ClusterResourceType,
  and registers all OpenChoreo extension resources (ClusterComponentTypes, ClusterWorkflows,
  ClusterResourceType, ClusterTraits, RBAC) in one helm install.'
name: wso2-agentic-engineer-bundle
type: application
version: 0.3.0
