apiVersion: batch/v1
kind: Job
metadata:
  name: wso2-ae-thunder-bootstrap
  namespace: wso2-ae
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: wso2-agentic-engineer
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    # Weight 0 — runs before oc-resources-apply (weight 5) so OC RBAC is
    # set up after Thunder clients exist and can authenticate.
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: wso2-agentic-engineer
        app.kubernetes.io/component: thunder-bootstrap
    spec:
      restartPolicy: Never
      # Runs as root so apk can install jq. This is a short-lived post-install
      # Job with no persistent storage — risk is acceptable for a dev/local cluster.
      securityContext:
        runAsNonRoot: false
      containers:
        - name: bootstrap
          image: {{ .Values.thunder.bootstrapImage }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          command:
            - sh
            - /scripts/thunder-bootstrap.sh
          env:
            - name: THUNDER_ADMIN_URL
              value: {{ .Values.thunder.adminURL | quote }}
            - name: CONSOLE_PUBLIC_URL
              value: {{ index .Values "wso2-ae-platform" "console" "publicURL" | quote }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: scripts
          configMap:
            name: wso2-ae-thunder-bootstrap
            defaultMode: 0555
        - name: tmp
          emptyDir: {}
