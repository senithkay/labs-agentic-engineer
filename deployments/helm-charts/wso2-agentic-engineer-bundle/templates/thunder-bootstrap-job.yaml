---
# ConfigMap holding the bootstrap script — referenced by the Job below.
apiVersion: v1
kind: ConfigMap
metadata:
  name: wso2-ae-thunder-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: wso2-agentic-engineer
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  thunder-bootstrap.sh: |
{{ .Files.Get "files/thunder-bootstrap.sh" | indent 4 }}
---
# Post-install Job: registers all ASDLC OAuth clients in OC Thunder.
# Idempotent — safe to re-run on helm upgrade.
apiVersion: batch/v1
kind: Job
metadata:
  name: wso2-ae-thunder-bootstrap
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: wso2-agentic-engineer
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: wso2-agentic-engineer
        app.kubernetes.io/component: thunder-bootstrap
    spec:
      restartPolicy: Never
      # Runs as root so apk can install jq. Short-lived post-install Job — acceptable for bootstrap.
      securityContext:
        runAsNonRoot: false
      containers:
        - name: bootstrap
          image: {{ .Values.thunder.bootstrapImage }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          command:
            - sh
            - /scripts/thunder-bootstrap.sh
          env:
            - name: THUNDER_ADMIN_URL
              value: {{ .Values.thunder.adminURL | quote }}
            - name: THUNDER_ADMIN_CLIENT_ID
              value: {{ .Values.thunder.adminClientId | quote }}
            - name: THUNDER_ADMIN_CLIENT_SECRET
              value: {{ .Values.thunder.adminClientSecret | quote }}
            - name: THUNDER_OU_HANDLE
              value: {{ .Values.thunder.ouHandle | quote }}
            - name: THUNDER_SYSTEM_CLIENT_ID
              value: {{ .Values.thunder.systemClientId | quote }}
            - name: THUNDER_SYSTEM_CLIENT_SECRET
              value: {{ .Values.thunder.systemClientSecret | quote }}
            - name: CONSOLE_PUBLIC_URL
              value: {{ index .Values "wso2-ae-platform" "console" "publicURL" | default .Values.console.publicURL | quote }}
          volumeMounts:
            - name: scripts
              mountPath: /scripts
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: scripts
          configMap:
            name: wso2-ae-thunder-bootstrap
            defaultMode: 0555
        - name: tmp
          emptyDir: {}
