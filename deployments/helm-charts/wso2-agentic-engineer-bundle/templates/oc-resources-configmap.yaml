apiVersion: v1
kind: ConfigMap
metadata:
  name: wso2-ae-oc-resources
  namespace: wso2-ae
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: wso2-agentic-engineer
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation
data:
  rbac.yaml: |
{{ .Files.Get "files/rbac.yaml" | indent 4 }}
  docker-build-workflow.yaml: |
{{ .Files.Get "files/docker-build-workflow.yaml" | indent 4 }}
  app-factory-coding-agent.yaml: |
{{ .Files.Get "files/app-factory-coding-agent.yaml" | indent 4 }}
