---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: asdlc-console
  namespace: wso2-ae
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: wso2-agentic-engineer
spec:
  parentRefs:
    - name: {{ .Values.expose.gatewayName }}
      namespace: {{ .Values.expose.gatewayNamespace }}
  hostnames:
    - {{ .Values.expose.consoleHostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: asdlc-console
          namespace: wso2-ae
          port: 3000
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: asdlc-api
  namespace: wso2-ae
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: wso2-agentic-engineer
spec:
  parentRefs:
    - name: {{ .Values.expose.gatewayName }}
      namespace: {{ .Values.expose.gatewayNamespace }}
  hostnames:
    - {{ .Values.expose.apiHostname | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: asdlc-api
          namespace: wso2-ae
          port: 9090
