apiVersion: batch/v1
kind: Job
metadata:
  name: wso2-ae-oc-resources-apply
  namespace: wso2-ae
  labels:
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: wso2-agentic-engineer
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: wso2-agentic-engineer
        app.kubernetes.io/component: oc-resources-apply
    spec:
      serviceAccountName: wso2-ae-installer
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: kubectl-apply
          image: bitnami/kubectl:latest
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              # Wait for OC controller webhook to be ready before applying CRDs
              echo "Waiting for OC controller-manager..."
              kubectl wait -n openchoreo-control-plane \
                --for=condition=available --timeout=300s \
                deployment/controller-manager || {
                echo "WARNING: OC controller not found or timed out, applying anyway..."
              }

              echo "Applying RBAC..."
              kubectl apply -f /resources/rbac.yaml

              echo "Applying Docker build workflow..."
              kubectl apply -f /resources/docker-build-workflow.yaml

              echo "Applying app-factory coding agent workflow..."
              kubectl apply -f /resources/app-factory-coding-agent.yaml

              echo "All OC resources applied successfully."
          volumeMounts:
            - name: oc-resources
              mountPath: /resources
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: oc-resources
          configMap:
            name: wso2-ae-oc-resources
        - name: tmp
          emptyDir: {}
