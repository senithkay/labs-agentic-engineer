# Grants the asdlc-api service account admin access to OpenChoreo so it can
# create/manage projects, components, workflows, and deployments on behalf of users.
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterAuthzRoleBinding
metadata:
  name: asdlc-api-client-binding
spec:
  effect: allow
  entitlement:
    claim: sub
    value: {{ .Values.authz.apiClientId }}
  roleMappings:
    - roleRef:
        kind: ClusterAuthzRole
        name: admin
---
# Grants the Thunder Administrators group admin access so human operators
# logged into the console have immediate admin rights.
apiVersion: openchoreo.dev/v1alpha1
kind: ClusterAuthzRoleBinding
metadata:
  name: administrators-group-binding
spec:
  effect: allow
  entitlement:
    claim: groups
    value: {{ .Values.authz.administratorsGroup }}
  roleMappings:
    - roleRef:
        kind: ClusterAuthzRole
        name: admin
