apiVersion: apps/v1
kind: Deployment
metadata:
  name: asdlc-console
  namespace: {{ .Release.Namespace }}
  labels:
    app: asdlc-console
    app.kubernetes.io/managed-by: {{ .Release.Service }}
    app.kubernetes.io/part-of: wso2-agentic-engineer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asdlc-console
  template:
    metadata:
      labels:
        app: asdlc-console
        app.kubernetes.io/part-of: wso2-agentic-engineer
    spec:
      containers:
        - name: asdlc-console
          image: "{{ .Values.console.image.repository }}:{{ .Values.console.image.tag }}"
          imagePullPolicy: {{ .Values.console.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.console.port }}
              name: http
          resources: {{ toYaml .Values.console.resources | nindent 12 }}
          env:
            # nginx proxy target for /asdlc-api-service/ requests
            - name: ASDLC_API_PROXY_URL
              value: "http://asdlc-api.{{ .Release.Namespace }}.svc.cluster.local:{{ .Values.asdlcApi.port }}"
            # React build-time vars (injected at container startup via entrypoint)
            - name: VITE_THUNDER_URL
              value: {{ .Values.console.thunderPublicURL | quote }}
            - name: VITE_THUNDER_CLIENT_ID
              value: {{ .Values.console.thunder.clientId | quote }}
            - name: VITE_THUNDER_SCOPES
              value: {{ .Values.console.thunder.scopes | quote }}
            - name: VITE_SIGN_IN_REDIRECT_URL
              value: {{ .Values.console.publicURL | quote }}
            - name: VITE_SIGN_OUT_REDIRECT_URL
              value: "{{ .Values.console.publicURL }}/login"
