apiVersion: openchoreo.dev/v1alpha1
kind: ResourceRelease
metadata:
  name: asdlc-db-production
  namespace: {{ .Release.Namespace }}
spec:
  owner:
    projectName: asdlc-platform
    resourceName: asdlc-db
  parameters:
    image: {{ .Values.postgres.image | quote }}
    database: {{ .Values.postgres.auth.database | quote }}
    username: {{ .Values.postgres.auth.username | quote }}
    password: {{ .Values.postgres.auth.password | quote }}
    storage: {{ .Values.postgres.storage | quote }}
  resourceType:
    kind: ClusterResourceType
    name: asdlc-postgres
    spec:
      retainPolicy: Retain
      parameters:
        openAPIV3Schema:
          type: object
          required:
            - password
          properties:
            image:
              type: string
              default: "postgres:16-alpine"
            database:
              type: string
              default: "asdlc"
            username:
              type: string
              default: "asdlc"
            password:
              type: string
            storage:
              type: string
              default: "5Gi"
      resources:
        - id: statefulset
          template:
            apiVersion: apps/v1
            kind: StatefulSet
            metadata:
              name: "${metadata.name}"
              namespace: "${metadata.namespace}"
              labels:
                app: "${metadata.name}"
                app.kubernetes.io/managed-by: openchoreo
            spec:
              serviceName: "${metadata.name}"
              replicas: 1
              selector:
                matchLabels:
                  app: "${metadata.name}"
              template:
                metadata:
                  labels:
                    app: "${metadata.name}"
                spec:
                  containers:
                    - name: postgres
                      image: "${parameters.image}"
                      ports:
                        - containerPort: 5432
                          name: postgres
                      env:
                        - name: POSTGRES_DB
                          value: "${parameters.database}"
                        - name: POSTGRES_USER
                          value: "${parameters.username}"
                        - name: POSTGRES_PASSWORD
                          value: "${parameters.password}"
                      readinessProbe:
                        exec:
                          command:
                            - pg_isready
                            - -U
                            - "${parameters.username}"
                        initialDelaySeconds: 5
                        periodSeconds: 10
                        timeoutSeconds: 5
                      volumeMounts:
                        - name: pgdata
                          mountPath: /var/lib/postgresql/data
                          subPath: pgdata
              volumeClaimTemplates:
                - metadata:
                    name: pgdata
                  spec:
                    accessModes:
                      - ReadWriteOnce
                    resources:
                      requests:
                        storage: "${parameters.storage}"
        - id: service
          template:
            apiVersion: v1
            kind: Service
            metadata:
              name: "asdlc-db"
              namespace: "${metadata.namespace}"
              labels:
                app: "${metadata.name}"
            spec:
              selector:
                app: "${metadata.name}"
              ports:
                - port: 5432
                  targetPort: 5432
                  name: postgres
              clusterIP: None
