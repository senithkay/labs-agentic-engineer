# ── Smee webhook relay (optional) ────────────────────────────────────────────
# For local k3d clusters where GitHub cannot deliver webhooks directly.
# Set smee.url to a smee.io channel URL (https://smee.io/new).
# When set, the BFF's GITHUB_WEBHOOK_DELIVERY_URL is overridden to this URL
# so GitHub registers webhooks against the public smee.io address.
smee:
  url: ""
  image: "node:20-alpine"

# ── GitHub ────────────────────────────────────────────────────────────────────
github:
  appSlug: "asdlc-platform"
  repoVisibility: "private"
  committerName: "ASDLC Bot"
  committerEmail: "bot@asdlc.dev"
  webhookSecret: "dev-webhook-secret"
  oauthStateKey: "dev-oauth-state-key-32-chars-long!!"
  appId: ""
  clientId: ""
  clientSecret: ""
  # GitHub App private key PEM (optional — leave empty for PAT-based auth)
  # Pass via: --set-file github.appPrivateKeyPem=key.pem
  appPrivateKeyPem: ""

# ── Anthropic ─────────────────────────────────────────────────────────────────
anthropic:
  apiKey: ""

# ── asdlc-api (BFF) ──────────────────────────────────────────────────────────
asdlcApi:
  # Hostname for the OC control-plane gateway HTTPRoute
  hostname: "asdlc-api.openchoreo.localhost"
  image:
    repository: ghcr.io/wso2/asdlc-api
    tag: 0.0.0-dev
    pullPolicy: Always
  port: 9090
  logLevel: info
  deploymentTier: production
  replicas: 1
  # Service identity for OC API calls (registered in OC Thunder by bootstrap job)
  serviceAuth:
    clientId: "asdlc-api-client"
    clientSecret: "asdlc-api-client-secret"
    tokenURL: "http://thunder-service.thunder.svc.cluster.local:8090/oauth2/token"
  # JWT for BFF → agents-service calls
  agentsJwt:
    clientId: "asdlc-bff-to-agents-service"
    clientSecret: "asdlc-bff-to-agents-service-secret"
  smApiURL: ""
  clusterGatewayProxyURL: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

# ── agents-service ────────────────────────────────────────────────────────────
agentsService:
  image:
    repository: ghcr.io/wso2/agents-service
    tag: 0.0.0-dev
    pullPolicy: Always
  port: 3400
  logLevel: info
  model: "claude-sonnet-4-6"
  jwt:
    audience: "asdlc-bff-to-agents-service"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

# ── console ───────────────────────────────────────────────────────────────────
console:
  # Hostname for the OC control-plane gateway HTTPRoute
  hostname: "asdlc.openchoreo.localhost"
  image:
    repository: ghcr.io/wso2/asdlc-console
    tag: 0.0.0-dev
    pullPolicy: Always
  # nginx port inside the container
  port: 3000
  publicURL: "http://asdlc.openchoreo.localhost:8080"
  thunderPublicURL: "http://thunder.openchoreo.localhost:8080"
  thunder:
    clientId: "asdlc-console-client"
    scopes: "openid profile email"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ── Thunder system client ─────────────────────────────────────────────────────
# Used by asdlc-api to provision per-org OAuth clients via Thunder admin API.
# Must match the client registered in OC Thunder by the bootstrap job.
thunderSystemClient:
  clientId: "asdlc-system-client"
  clientSecret: "asdlc-system-client-secret"
