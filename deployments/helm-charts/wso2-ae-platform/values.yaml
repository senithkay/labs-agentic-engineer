# ── OC control-plane gateway ──────────────────────────────────────────────────
# The ASDLC HTTPRoutes are placed in this gateway's namespace so that the
# control-plane gateway routes external traffic to the services in wso2-ae.
ocGateway:
  namespace: "openchoreo-control-plane"
  name: "gateway-default"

# ── OpenChoreo platform API ───────────────────────────────────────────────────
openchoreo:
  apiBaseURL: "http://openchoreo-api.openchoreo-control-plane:8080"
  apiGatewayHost: "api.openchoreo.localhost"
  # OC organisation handle — used to name the workflows-<orgHandle> namespace
  # where the BFF pre-stages coding-agent secrets before each WorkflowRun.
  orgHandle: "default"

# ── Identity Provider (OC Thunder) ───────────────────────────────────────────
idp:
  # Public URL — must match the `iss` claim in tokens Thunder issues.
  issuer: "http://thunder.openchoreo.localhost:8080"
  # URL used by the browser / external clients for JWKS discovery.
  jwksURL: "http://thunder.openchoreo.localhost:8080/oauth2/jwks"
  # In-cluster URL the asdlc-api pod uses to fetch JWKS at runtime.
  jwksInternalURL: "http://thunder-service.thunder.svc.cluster.local:8090/oauth2/jwks"
  tokenURL: "http://thunder-service.thunder.svc.cluster.local:8090/oauth2/token"
  adminURL: "http://thunder-service.thunder.svc.cluster.local:8090"

# ── BFF public URL ────────────────────────────────────────────────────────────
# The stable gateway-routed URL for the BFF, reachable from:
#   - GitHub (webhook delivery)
#   - Coding-agent pods in WorkflowPlane (callback)
bff:
  publicURL: "http://asdlc-api.openchoreo.localhost:8080"

# ── OpenBao ───────────────────────────────────────────────────────────────────
openbao:
  addr: "http://openbao.openbao.svc.cluster.local:8200"
  # Dev default — override for production
  token: "root"

# ── Observer ──────────────────────────────────────────────────────────────────
observer:
  url: "http://observer.openchoreo-observability-plane.svc.cluster.local:8080"
  oauth:
    tokenURL: "http://thunder-service.thunder.svc.cluster.local:8090/oauth2/token"
    clientId: "openchoreo-observer-resource-reader-client"
    clientSecret: "openchoreo-observer-resource-reader-client-secret"

# ── PostgreSQL (direct StatefulSet — not an OC Resource) ─────────────────────
# Set postgres.url to use an external database and skip the bundled StatefulSet.
postgres:
  # If non-empty, use this as DATABASE_URL and skip bundled StatefulSet deployment.
  url: ""
  image: "postgres:16-alpine"
  auth:
    database: asdlc
    username: asdlc
    # WARNING: change this for production
    password: "asdlc-dev-password"
  storage: "5Gi"

