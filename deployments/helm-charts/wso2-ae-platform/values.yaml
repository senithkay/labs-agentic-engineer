# ── OC control-plane gateway ──────────────────────────────────────────────────
# The ASDLC HTTPRoutes are placed in this gateway's namespace so that the
# control-plane gateway routes external traffic to the services in wso2-ae.
ocGateway:
  namespace: "openchoreo-control-plane"
  name: "gateway-default"

# ── OpenChoreo platform API ───────────────────────────────────────────────────
openchoreo:
  apiBaseURL: "http://openchoreo-api.openchoreo-control-plane:8080"
  apiGatewayHost: "api.openchoreo.localhost"
  # OC organisation handle — used to name the workflows-<orgHandle> namespace
  # where the BFF pre-stages coding-agent secrets before each WorkflowRun.
  orgHandle: "default"

# ── Identity Provider (OC Thunder) ───────────────────────────────────────────
idp:
  # Public URL — must match the `iss` claim in tokens Thunder issues.
  issuer: "http://thunder.openchoreo.localhost:8080"
  # URL used by the browser / external clients for JWKS discovery.
  jwksURL: "http://thunder.openchoreo.localhost:8080/oauth2/jwks"
  # In-cluster URL the asdlc-api pod uses to fetch JWKS at runtime.
  jwksInternalURL: "http://thunder-service.thunder.svc.cluster.local:8090/oauth2/jwks"
  tokenURL: "http://thunder-service.thunder.svc.cluster.local:8090/oauth2/token"
  adminURL: "http://thunder-service.thunder.svc.cluster.local:8090"

# ── BFF public URL ────────────────────────────────────────────────────────────
# The stable gateway-routed URL for the BFF, reachable from:
#   - GitHub (webhook delivery)
#   - Coding-agent pods in WorkflowPlane (callback)
bff:
  publicURL: "http://asdlc-api.openchoreo.localhost:8080"

# ── OpenBao ───────────────────────────────────────────────────────────────────
openbao:
  addr: "http://openbao.openbao.svc.cluster.local:8200"
  # Dev default — override for production
  token: "root"

# ── Observer ──────────────────────────────────────────────────────────────────
observer:
  url: "http://observer.openchoreo-observability-plane.svc.cluster.local:8080"
  oauth:
    tokenURL: "http://thunder-service.thunder.svc.cluster.local:8090/oauth2/token"
    clientId: "openchoreo-observer-resource-reader-client"
    clientSecret: "openchoreo-observer-resource-reader-client-secret"

# ── PostgreSQL (direct StatefulSet — not an OC Resource) ─────────────────────
# Set postgres.url to use an external database and skip the bundled StatefulSet.
postgres:
  # If non-empty, use this as DATABASE_URL and skip bundled StatefulSet deployment.
  url: ""
  image: "postgres:16-alpine"
  auth:
    database: asdlc
    username: asdlc
    # WARNING: change this for production
    password: "asdlc-dev-password"
  storage: "5Gi"

# ── Task JWT signing key ──────────────────────────────────────────────────────
taskSigning:
  issuer: "asdlc-bff"
  audience: "git-service"
  # Auto-generated by Helm hook Job (wso2-agentic-engineer-bundle/task-signing-key-job.yaml)
  # on first install. Subsequent helm upgrades preserve the existing key, ensuring that
  # task JWTs remain valid across pod restarts and cluster upgrades.
  #
  # To override with a custom key (for production):
  #   helm install ... --set-file taskSigning.privateKeyPem=my-key.pem
  #
  # If provided, this value is used; otherwise the hook Job auto-generates it.
  privateKeyPem: ""

# ── Smee webhook relay (optional) ────────────────────────────────────────────
# For local k3d clusters where GitHub cannot deliver webhooks directly.
# Set smee.url to a smee.io channel URL (https://smee.io/new).
# When set, the BFF's GITHUB_WEBHOOK_DELIVERY_URL is overridden to this URL
# so GitHub registers webhooks against the public smee.io address.
smee:
  url: ""
  image: "node:20-alpine"

# ── GitHub ────────────────────────────────────────────────────────────────────
github:
  appSlug: "asdlc-platform"
  repoVisibility: "private"
  committerName: "ASDLC Bot"
  committerEmail: "bot@asdlc.dev"
  webhookSecret: "dev-webhook-secret"
  oauthStateKey: "dev-oauth-state-key-32-chars-long!!"
  appId: ""
  clientId: ""
  clientSecret: ""
  # GitHub App private key PEM (optional — leave empty for PAT-based auth)
  # Pass via: --set-file github.appPrivateKeyPem=key.pem
  appPrivateKeyPem: ""

# ── Anthropic ─────────────────────────────────────────────────────────────────
anthropic:
  apiKey: ""

# ── asdlc-api (BFF) ──────────────────────────────────────────────────────────
asdlcApi:
  # Hostname for the OC control-plane gateway HTTPRoute
  hostname: "asdlc-api.openchoreo.localhost"
  image:
    repository: ghcr.io/wso2/asdlc-api
    tag: 0.0.0-dev
    pullPolicy: Always
  port: 9090
  logLevel: info
  deploymentTier: production
  replicas: 1
  # Service identity for OC API calls (registered in OC Thunder by bootstrap job)
  serviceAuth:
    clientId: "asdlc-api-client"
    clientSecret: "asdlc-api-client-secret"
    tokenURL: "http://thunder-service.thunder.svc.cluster.local:8090/oauth2/token"
  # JWT for BFF → agents-service calls
  agentsJwt:
    clientId: "asdlc-bff-to-agents-service"
    clientSecret: "asdlc-bff-to-agents-service-secret"
  smApiURL: ""
  clusterGatewayProxyURL: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

# ── agents-service ────────────────────────────────────────────────────────────
agentsService:
  image:
    repository: ghcr.io/wso2/agents-service
    tag: 0.0.0-dev
    pullPolicy: Always
  port: 3400
  logLevel: info
  model: "claude-sonnet-4-6"
  jwt:
    audience: "asdlc-bff-to-agents-service"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

# ── console ───────────────────────────────────────────────────────────────────
console:
  # Hostname for the OC control-plane gateway HTTPRoute
  hostname: "asdlc.openchoreo.localhost"
  image:
    repository: ghcr.io/wso2/asdlc-console
    tag: 0.0.0-dev
    pullPolicy: Always
  # nginx port inside the container
  port: 3000
  publicURL: "http://asdlc.openchoreo.localhost:8080"
  thunderPublicURL: "http://thunder.openchoreo.localhost:8080"
  thunder:
    clientId: "asdlc-console-client"
    scopes: "openid profile email"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ── Thunder system client ─────────────────────────────────────────────────────
# Used by asdlc-api to provision per-org OAuth clients via Thunder admin API.
# Must match the client registered in OC Thunder by the bootstrap job.
thunderSystemClient:
  clientId: "asdlc-system-client"
  # clientSecret stored in secret store at externalSecret.keys.thunderSystemClientSecret

# ── External Secrets (ESO) ────────────────────────────────────────────────────
# The chart creates ClusterSecretStore "default" pointing at OpenBao (configured via
# openbao.* above). OpenBao KV v2 stores secrets as {"value":"..."} — property is
# hardcoded to "value" in all templates.
externalSecret:
  refreshInterval: "15s"
  secretStoreRef:
    name: default
    kind: ClusterSecretStore
  # Paths in OpenBao where each secret is stored.
  # Change these if you use different key paths in your OpenBao instance.
  keys:
    databaseURL: "asdlc/platform/db/url"
    thunderSystemClientSecret: "asdlc/platform/thunder/system-client-secret"
    serviceAuthClientSecret: "asdlc/platform/service-auth/client-secret"
    serviceAuthGitClientSecret: "asdlc/platform/service-auth/git-secret"
    serviceAuthAgentsClientSecret: "asdlc/platform/service-auth/agents-secret"
    githubWebhookSecret: "asdlc/platform/github/webhook-secret"
    oauthStateKey: "asdlc/platform/github/oauth-state-key"
    githubClientSecret: "asdlc/platform/github/client-secret"
    observerOauthClientSecret: "asdlc/platform/observer/client-secret"
