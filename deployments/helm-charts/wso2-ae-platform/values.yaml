# ── GitHub ────────────────────────────────────────────────────────────────────
github:
  appSlug: "asdlc-platform"
  repoVisibility: "private"
  committerName: "ASDLC Bot"
  committerEmail: "bot@asdlc.dev"
  webhookSecret: "dev-webhook-secret"
  oauthStateKey: "dev-oauth-state-key-32-chars-long!!"
  # GitHub App credentials (optional — App-mode connect only)
  appId: ""
  clientId: ""
  clientSecret: ""
  # GitHub App private key PEM (optional — leave empty for PAT-based auth)
  appPrivateKeyPem: ""

# ── Anthropic ─────────────────────────────────────────────────────────────────
anthropic:
  apiKey: ""

# ── asdlc-api ────────────────────────────────────────────────────────────────
asdlcApi:
  image:
    repository: ghcr.io/senithkay/asdlc-api
    tag: latest
    pullPolicy: Always
  port: 9090
  logLevel: info
  deploymentTier: production
  replicas: 1
  serviceAuth:
    clientId: "asdlc-api-client"
    clientSecret: "asdlc-api-client-secret"
  agentsJwt:
    clientId: "asdlc-bff-to-agents-service"
    clientSecret: "asdlc-bff-to-agents-service-secret"
  smApiURL: ""
  clusterGatewayProxyURL: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

# ── agents-service ────────────────────────────────────────────────────────────
agentsService:
  image:
    repository: ghcr.io/senithkay/agents-service
    tag: latest
    pullPolicy: Always
  port: 3400
  logLevel: info
  model: "claude-sonnet-4-5"
  jwt:
    audience: "asdlc-bff-to-agents-service"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

# ── console ───────────────────────────────────────────────────────────────────
console:
  image:
    repository: ghcr.io/senithkay/asdlc-console
    tag: latest
    pullPolicy: Always
  port: 3000
  publicURL: "https://asdlc.example.com"
  thunderPublicURL: "https://thunder.asdlc.example.com"
  thunder:
    clientId: "asdlc-console-client"
    scopes: "openid profile email"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"

# ── Thunder system client (for asdlc-api to provision per-org OAuth clients) ──
# Must match the values in ae-thunder.bootstrap.systemClient.*
thunderSystemClient:
  clientId: "asdlc-system-client"
  clientSecret: "asdlc-system-client-secret"
