apiVersion: apps/v1
kind: Deployment
metadata:
  name: asdlc-console
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: asdlc-console
  template:
    metadata:
      labels:
        app: asdlc-console
    spec:
      containers:
        - name: console
          image: {{ .Values.console.image.repository }}:{{ .Values.console.image.tag }}
          imagePullPolicy: {{ .Values.console.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.console.port }}
          env:
            # nginx proxy target for /asdlc-api-service/ requests
            - name: ASDLC_API_PROXY_URL
              value: "http://asdlc-api.{{ .Values.namespace }}.svc.cluster.local:{{ .Values.asdlcApi.port }}"
            # React build-time vars (injected at container startup via entrypoint)
            - name: VITE_THUNDER_URL
              value: {{ .Values.console.thunderPublicURL }}
            - name: VITE_THUNDER_CLIENT_ID
              value: {{ .Values.console.thunder.clientId }}
            - name: VITE_THUNDER_SCOPES
              value: {{ .Values.console.thunder.scopes }}
            - name: VITE_SIGN_IN_REDIRECT_URL
              value: {{ .Values.console.publicURL }}
            - name: VITE_SIGN_OUT_REDIRECT_URL
              value: "{{ .Values.console.publicURL }}/login"
          resources: {{- toYaml .Values.console.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /
              port: {{ .Values.console.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
