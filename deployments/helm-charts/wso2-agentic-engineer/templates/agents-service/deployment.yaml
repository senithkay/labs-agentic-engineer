apiVersion: apps/v1
kind: Deployment
metadata:
  name: agents-service
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agents-service
  template:
    metadata:
      labels:
        app: agents-service
    spec:
      containers:
        - name: agents-service
          image: {{ .Values.agentsService.image.repository }}:{{ .Values.agentsService.image.tag }}
          imagePullPolicy: {{ .Values.agentsService.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.agentsService.port }}
          env:
            - name: PORT
              value: {{ .Values.agentsService.port | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.agentsService.logLevel }}
            - name: AGENT_MODEL
              value: {{ .Values.agentsService.model }}
            - name: JWKS_URL
              value: {{ .Values.idp.jwksURL }}
            - name: JWT_ISSUER
              value: {{ .Values.idp.issuer }}
            - name: JWT_AUDIENCE
              value: {{ .Values.agentsService.jwt.audience }}
            # Resolves per-org Anthropic key via the merged asdlc-api
            - name: ASDLC_API_URL
              value: "http://asdlc-api.{{ .Values.namespace }}:{{ .Values.asdlcApi.port }}"
          resources: {{- toYaml .Values.agentsService.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.agentsService.port }}
            initialDelaySeconds: 10
            periodSeconds: 10
