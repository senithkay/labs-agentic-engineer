{{- if not .Values.secrets.existingSecret }}
{{- $secretName := include "asdlc.appSecretName" . -}}
{{- $existingSecret := (lookup "v1" "Secret" .Release.Namespace $secretName) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "asdlc.labels" . | nindent 4 }}
type: Opaque
stringData:
  # Auto-generated on first install — preserved across upgrades via lookup
  {{- $existingWebhookSecret := "" }}
  {{- if and $existingSecret (hasKey $existingSecret.data "GITHUB_WEBHOOK_SECRET") }}
  {{- $existingWebhookSecret = (index $existingSecret.data "GITHUB_WEBHOOK_SECRET" | b64dec) }}
  {{- end }}
  GITHUB_WEBHOOK_SECRET: {{ .Values.github.webhookSecret | default $existingWebhookSecret | default (randAlphaNum 32) | quote }}

  {{- $existingOauthKey := "" }}
  {{- if and $existingSecret (hasKey $existingSecret.data "OAUTH_STATE_SIGNING_KEY") }}
  {{- $existingOauthKey = (index $existingSecret.data "OAUTH_STATE_SIGNING_KEY" | b64dec) }}
  {{- end }}
  OAUTH_STATE_SIGNING_KEY: {{ .Values.github.oauthStateKey | default $existingOauthKey | default (randAlphaNum 32) | quote }}

  # User-supplied values — empty by default, override in values
  ANTHROPIC_API_KEY: {{ .Values.anthropic.apiKey | default "" | quote }}
  OPENBAO_TOKEN: {{ .Values.openbao.token | default "root" | quote }}

  # GitHub App credentials (optional — only for App-mode GitHub connect)
  GITHUB_APP_ID: {{ .Values.github.appId | default "" | quote }}
  GITHUB_CLIENT_ID: {{ .Values.github.clientId | default "" | quote }}
  GITHUB_CLIENT_SECRET: {{ .Values.github.clientSecret | default "" | quote }}
{{- end }}
---
{{- if not .Values.postgres.auth.existingSecret }}
{{- $pgSecretName := include "asdlc.postgresSecretName" . -}}
{{- $existingPgSecret := (lookup "v1" "Secret" .Release.Namespace $pgSecretName) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $pgSecretName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "asdlc.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{- $existingPgPassword := "" }}
  {{- if and $existingPgSecret (hasKey $existingPgSecret.data "password") }}
  {{- $existingPgPassword = (index $existingPgSecret.data "password" | b64dec) }}
  {{- end }}
  password: {{ .Values.postgres.auth.password | default $existingPgPassword | default (randAlphaNum 16) | quote }}
{{- end }}
