{{- if not .Values.taskSigning.existingSecret }}
apiVersion: batch/v1
kind: Job
metadata:
  name: asdlc-task-signing-key-gen
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "asdlc.labels" . | nindent 4 }}
    app.kubernetes.io/component: task-signing-key-gen
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "asdlc.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: task-signing-key-gen
    spec:
      serviceAccountName: {{ include "asdlc.serviceAccountName" . }}
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: task-signing-key-gen
          image: alpine:3.21
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
          command:
            - /bin/sh
            - -c
            - |
              set -eu

              apk add --no-cache openssl kubectl --quiet

              SECRET_NAME="{{ include "asdlc.taskSigningKeySecretName" . }}"
              NAMESPACE="{{ .Values.namespace }}"

              # Idempotent — skip if secret already exists
              if kubectl get secret "$SECRET_NAME" -n "$NAMESPACE" >/dev/null 2>&1; then
                echo "Task signing key secret already exists, skipping generation"
                exit 0
              fi

              echo "Generating RSA-2048 task signing key..."
              mkdir -p /tmp/keys

              openssl genpkey -algorithm RSA \
                -out /tmp/keys/task-signing.pem \
                -pkeyopt rsa_keygen_bits:2048 2>/dev/null

              if [ ! -f /tmp/keys/task-signing.pem ]; then
                echo "ERROR: Key generation failed"
                exit 1
              fi

              echo "Creating Kubernetes Secret..."
              kubectl create secret generic "$SECRET_NAME" \
                -n "$NAMESPACE" \
                --from-file=task-signing.pem=/tmp/keys/task-signing.pem \
                --dry-run=client -o yaml | kubectl apply -f -

              echo "Task signing key secret created: $SECRET_NAME"
{{- end }}
