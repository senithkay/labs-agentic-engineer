# ── Namespace ─────────────────────────────────────────────────────────────────
namespace: wso2-ae

# ── OpenChoreo platform API ───────────────────────────────────────────────────
openchoreo:
  apiBaseURL: "http://openchoreo-api.openchoreo-control-plane:8080"
  apiGatewayHost: "api.openchoreo.localhost"

# ── Identity Provider (Thunder) ───────────────────────────────────────────────
idp:
  issuer: "http://thunder-service.thunder.svc.cluster.local:8090"
  jwksURL: "http://thunder-service.thunder.svc.cluster.local:8090/oauth2/jwks"
  tokenURL: "http://thunder-service.thunder.svc.cluster.local:8090/oauth2/token"
  adminURL: "http://thunder-service.thunder.svc.cluster.local:8090"

# ── OpenBao ───────────────────────────────────────────────────────────────────
openbao:
  addr: "http://openbao.openbao.svc.cluster.local:8200"
  # Dev default — override for production
  token: "root"

# ── Observer ──────────────────────────────────────────────────────────────────
observer:
  url: "http://observer.openchoreo-observability-plane.svc.cluster.local:8080"
  oauth:
    clientId: "openchoreo-observer-resource-reader-client"
    clientSecret: "openchoreo-observer-resource-reader-client-secret"

# ── PostgreSQL ────────────────────────────────────────────────────────────────
postgres:
  enabled: true
  image: postgres:16-alpine
  auth:
    database: asdlc
    username: asdlc
    # Leave empty to auto-generate on first install
    # Override for production or to use a pre-existing password
    password: ""
    # Point to a pre-existing secret instead (key: password)
    existingSecret: ""
  storage: 5Gi
  # External DB — used when enabled: false
  external:
    host: ""
    port: 5432
    database: asdlc
    username: asdlc
    existingSecret: ""

# ── Task JWT signing key ──────────────────────────────────────────────────────
taskSigning:
  # Auto-generated as RSA-2048 by a pre-install hook Job.
  # Point to a pre-existing secret (key: task-signing.pem) to skip generation.
  existingSecret: ""
  issuer: "asdlc-bff"
  audience: "git-service"

# ── GitHub ────────────────────────────────────────────────────────────────────
github:
  appSlug: "asdlc-platform"
  repoVisibility: "private"
  committerName: "ASDLC Bot"
  committerEmail: "bot@asdlc.dev"
  # Auto-generated if left empty
  webhookSecret: ""
  oauthStateKey: ""
  # GitHub App credentials (optional — App-mode connect only)
  appId: ""
  clientId: ""
  clientSecret: ""

# ── Anthropic ─────────────────────────────────────────────────────────────────
anthropic:
  # Platform-level fallback key. Required for AI flows to work.
  apiKey: ""

# ── Secrets ───────────────────────────────────────────────────────────────────
secrets:
  # Point to a single pre-existing secret that contains all keys
  # (GITHUB_WEBHOOK_SECRET, OAUTH_STATE_SIGNING_KEY, ANTHROPIC_API_KEY,
  #  OPENBAO_TOKEN, GITHUB_APP_ID, GITHUB_CLIENT_ID, GITHUB_CLIENT_SECRET)
  # Leave empty to let the chart auto-generate a secret.
  existingSecret: ""
  # Pre-existing secret for GitHub App private key (key: private-key.pem)
  # Leave empty if not using GitHub App mode
  githubAppKeySecret: ""

# ── asdlc-api ────────────────────────────────────────────────────────────────
asdlcApi:
  image:
    repository: ghcr.io/senithkay/asdlc-api
    tag: latest
    pullPolicy: Always
  port: 9090
  logLevel: info
  deploymentTier: production
  serviceAuth:
    clientId: "asdlc-api-client"
    clientSecret: "asdlc-api-client-secret"
  agentsJwt:
    clientId: "asdlc-bff-to-agents-service"
    clientSecret: "asdlc-bff-to-agents-service-secret"
  smApiURL: ""
  clusterGatewayProxyURL: ""
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

# ── agents-service ────────────────────────────────────────────────────────────
agentsService:
  image:
    repository: ghcr.io/senithkay/agents-service
    tag: latest
    pullPolicy: Always
  port: 3400
  logLevel: info
  model: "claude-sonnet-4-5"
  jwt:
    audience: "asdlc-bff-to-agents-service"
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "1"
      memory: "512Mi"

# ── console ───────────────────────────────────────────────────────────────────
console:
  image:
    repository: ghcr.io/senithkay/asdlc-console
    tag: latest
    pullPolicy: Always
  port: 3000
  # Public-facing URLs shown to the browser — set to your actual domain
  publicURL: "https://asdlc.example.com"
  thunderPublicURL: "https://thunder.example.com"
  thunder:
    clientId: "asdlc-console-client"
    scopes: "openid profile email"
  resources:
    requests:
      cpu: "50m"
      memory: "64Mi"
    limits:
      cpu: "200m"
      memory: "128Mi"
