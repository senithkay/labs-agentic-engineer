name: Publish Helm Chart

on:
  push:
    branches: [main]
    paths:
      - "deployments/helm-charts/**"
      - ".github/workflows/publish-chart.yml"

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  CHART_DIR: deployments/helm-charts/wso2-agentic-engineer-bundle

jobs:
  publish:
    name: Package and push chart
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Build chart dependencies
        run: helm dependency build ${{ env.CHART_DIR }}

      - name: Package chart
        run: helm package ${{ env.CHART_DIR }} -d /tmp/chart-output

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Push chart
        run: |
          helm push /tmp/chart-output/*.tgz oci://${{ env.REGISTRY }}/${{ env.OWNER }}
