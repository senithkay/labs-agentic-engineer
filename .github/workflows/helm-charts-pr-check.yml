name: Helm Charts PR Check

on:
  push:
    branches: [main]
    paths:
      - "deployments/helm-charts/**"
      - ".github/workflows/helm-charts-pr-check.yml"
  pull_request:
    paths:
      - "deployments/helm-charts/**"
      - ".github/workflows/helm-charts-pr-check.yml"

env:
  CHART_DIR: deployments/helm-charts/wso2-agentic-engineer-bundle

jobs:
  lint-and-template:
    name: Lint and template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Build chart dependencies
        run: helm dependency build ${{ env.CHART_DIR }}

      - name: Lint chart
        run: helm lint ${{ env.CHART_DIR }}

      - name: Template chart (verify rendering)
        run: helm template wso2-ae ${{ env.CHART_DIR }} > /dev/null
