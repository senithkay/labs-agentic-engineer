name: Build Images

on:
  push:
    branches: [main]
    paths:
      - "asdlc-service/**"
      - "agents/**"
      - "console/**"
      - "ui-components/**"
      - "deployments/installer/**"
      - "deployments/helm-charts/wso2-ae-installer/**"
      - ".github/workflows/build-images.yml"
  pull_request:
    paths:
      - "asdlc-service/**"
      - "agents/**"
      - "console/**"
      - "ui-components/**"
      - "deployments/installer/**"
      - "deployments/helm-charts/wso2-ae-installer/**"
      - ".github/workflows/build-images.yml"

jobs:
  asdlc-api:
    name: asdlc-api
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: ./asdlc-service
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha,scope=asdlc-api
          cache-to: type=gha,mode=max,scope=asdlc-api,ignore-error=true

  agents-service:
    name: agents-service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: ./agents
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha,scope=agents-service
          cache-to: type=gha,mode=max,scope=agents-service,ignore-error=true

  asdlc-console:
    name: asdlc-console
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          # Repo root — console/Dockerfile copies from ui-components/
          context: .
          file: ./console/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha,scope=asdlc-console
          cache-to: type=gha,mode=max,scope=asdlc-console,ignore-error=true

  ae-installer:
    name: ae-installer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          # Repo root — Dockerfile embeds helm charts from deployments/helm-charts/
          context: .
          file: ./deployments/installer/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: false
          cache-from: type=gha,scope=ae-installer
          cache-to: type=gha,mode=max,scope=ae-installer,ignore-error=true
