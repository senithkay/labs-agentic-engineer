name: Release

on:
  workflow_dispatch:
    inputs:
      target_version:
        description: "Release version without 'v' prefix (e.g. 0.5.0)"
        required: true

env:
  REGISTRY: ghcr.io
  OWNER: ${{ github.repository_owner }}
  CHART_DIR: deployments/helm-charts/wso2-agentic-engineer-bundle

jobs:
  prepare-release:
    name: Prepare release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.set-version.outputs.version }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set version output
        id: set-version
        run: echo "version=v${{ github.event.inputs.target_version }}" >> "$GITHUB_OUTPUT"

      - name: Update versions
        run: |
          chmod +x .github/scripts/update-versions.sh
          .github/scripts/update-versions.sh "${{ github.event.inputs.target_version }}"

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deployments/helm-charts/
          git commit -m "chore: release v${{ github.event.inputs.target_version }}"
          git tag "v${{ github.event.inputs.target_version }}"
          git push origin HEAD:main --tags

  build-images:
    name: Build and push images
    needs: prepare-release
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - name: asdlc-api
            context: ./asdlc-service
            file: ./asdlc-service/Dockerfile
          - name: agents-service
            context: ./agents
            file: ./agents/Dockerfile
          - name: asdlc-console
            context: .
            file: ./console/Dockerfile
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.prepare-release.outputs.version }}

      - uses: docker/setup-buildx-action@f7ce87c1d6bead3e36075b2ce75da1f6cc28aaca # v3.9.0

      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@4f58ea79222b3b9dc2c8bbdd6debcef730109a75 # v6.9.0
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.file }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ matrix.name }}:${{ needs.prepare-release.outputs.version }}
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }},ignore-error=true

  publish-chart:
    name: Publish chart
    needs: [prepare-release, build-images]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.prepare-release.outputs.version }}

      - uses: azure/setup-helm@1a275c3b69536ee54be43f2070a358922e12c8d4 # v4.3.1

      - name: Build chart dependencies
        run: helm dependency build ${{ env.CHART_DIR }}

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            helm registry login ${{ env.REGISTRY }} \
              --username ${{ github.actor }} \
              --password-stdin

      - name: Package and push chart
        run: |
          helm package ${{ env.CHART_DIR }} -d /tmp/chart-output
          helm push /tmp/chart-output/*.tgz oci://${{ env.REGISTRY }}/${{ env.OWNER }}

  create-release:
    name: Create GitHub release
    needs: [prepare-release, publish-chart]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: ${{ needs.prepare-release.outputs.version }}

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ needs.prepare-release.outputs.version }}" \
            --title "Release ${{ needs.prepare-release.outputs.version }}" \
            --generate-notes
